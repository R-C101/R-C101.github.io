<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishit Chugh — Portfolio Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bar:#0d0d10;
    --bar2:#15151a;
    --line:#2a2a32;
    --ink:#ededf2;
    --dim:#8b8b96;
    --dimmer:#5a5a64;
    --os:#57b3c9;
    --fresh:#c9a24b;
    --accent:#e8703a;
    --barH:52px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:#000;color:var(--ink);
    font-family:"Hanken Grotesk",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;
  }
  .mono{font-family:"JetBrains Mono",monospace}

  /* ---------- Top switcher bar ---------- */
  .bar{
    height:var(--barH);flex:none;
    background:linear-gradient(180deg,var(--bar2),var(--bar));
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;
    padding:0 12px 0 16px;
    position:relative;z-index:10;
  }
  .brand{
    display:flex;align-items:baseline;gap:9px;flex:none;
    padding-right:14px;margin-right:2px;border-right:1px solid var(--line);height:26px;
  }
  .brand b{font-size:14px;font-weight:700;letter-spacing:-.02em}
  .brand .idx{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--dimmer)}

  .tabs{
    display:flex;align-items:center;gap:5px;flex:1;min-width:0;
    overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
    padding:0 2px;height:100%;
  }
  .tabs::-webkit-scrollbar{display:none}
  .grp-label{
    font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--dimmer);flex:none;padding:0 6px 0 4px;
    align-self:center;
  }
  .sep{width:1px;height:22px;background:var(--line);flex:none;margin:0 4px}

  .tab{
    flex:none;display:flex;align-items:center;gap:8px;
    height:34px;padding:0 12px;border-radius:8px;cursor:pointer;
    background:transparent;border:1px solid transparent;
    color:var(--dim);font-size:13px;font-weight:500;letter-spacing:-.01em;
    white-space:nowrap;transition:background .18s,color .18s,border-color .18s;
    font-family:inherit;
  }
  .tab .n{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--dimmer);transition:color .18s}
  .tab .sw{width:8px;height:8px;border-radius:2px;flex:none;opacity:.85}
  .tab:hover{background:#1e1e24;color:var(--ink)}
  .tab.active{background:#242430;color:#fff;border-color:#3a3a46}
  .tab.active .n{color:var(--ink)}
  .tab.active::after{
    content:"";position:absolute;
  }

  .baractions{display:flex;align-items:center;gap:6px;flex:none;padding-left:6px;border-left:1px solid var(--line);height:26px}
  .iconbtn{
    display:flex;align-items:center;justify-content:center;gap:6px;
    height:34px;padding:0 11px;border-radius:8px;cursor:pointer;
    background:#1a1a20;border:1px solid var(--line);color:var(--dim);
    font-size:12px;font-family:"JetBrains Mono",monospace;text-decoration:none;
    transition:background .18s,color .18s,border-color .18s;
  }
  .iconbtn:hover{background:#24242c;color:var(--ink);border-color:#3a3a46}
  .iconbtn svg{width:15px;height:15px}
  .navbtn{width:34px;padding:0}

  /* ---------- Stage ---------- */
  .stage{flex:1;position:relative;background:#000;min-height:0}
  .stage iframe{
    position:absolute;inset:0;width:100%;height:100%;border:0;
    background:#0a0a0a;opacity:0;transition:opacity .28s ease;
  }
  .stage iframe.show{opacity:1}
  .loading{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--dimmer);font-family:"JetBrains Mono",monospace;font-size:12px;
    letter-spacing:.1em;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity .2s;
  }
  .loading.on{opacity:1}

  /* caption chip bottom-left */
  .caption{
    position:absolute;left:16px;bottom:16px;z-index:5;
    display:flex;align-items:center;gap:10px;max-width:min(560px,72vw);
    padding:10px 14px;border-radius:10px;
    background:rgba(10,10,12,.72);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.1);
    transition:opacity .3s, transform .3s;
  }
  .caption.hide{opacity:0;transform:translateY(8px);pointer-events:none}
  .caption .sw{width:10px;height:10px;border-radius:3px;flex:none}
  .caption .txt{min-width:0}
  .caption .t{font-size:13px;font-weight:700;letter-spacing:-.01em;display:flex;gap:8px;align-items:baseline}
  .caption .t .tag{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dimmer)}
  .caption .d{font-size:11.5px;color:var(--dim);line-height:1.35;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .caption .x{margin-left:2px;color:var(--dimmer);cursor:pointer;font-size:15px;line-height:1;flex:none;padding:2px}
  .caption .x:hover{color:var(--ink)}

  .hint{
    position:absolute;right:16px;bottom:16px;z-index:5;
    font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--dimmer);
    background:rgba(10,10,12,.6);backdrop-filter:blur(8px);
    padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.07);
    transition:opacity .3s;
  }
  .hint.hide{opacity:0}

  @media (max-width:720px){
    .brand,.grp-label,.caption .d{display:none}
    .hint{display:none}
  }
</style>
</head>
<body>

<div class="bar">
  <div class="brand"><b>Directions</b><span class="idx mono">RC · 10</span></div>
  <div class="tabs" id="tabs"></div>
  <div class="baractions">
    <button class="iconbtn navbtn" id="prev" title="Previous (←)" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="iconbtn navbtn" id="next" title="Next (→)" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <a class="iconbtn" id="openfull" href="#" target="_blank" rel="noopener" title="Open in new tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      <span>open</span>
    </a>
  </div>
</div>

<div class="stage" id="stage">
  <div class="loading" id="loading">loading…</div>
  <div class="caption" id="caption">
    <span class="sw" id="cap-sw"></span>
    <div class="txt">
      <div class="t"><span id="cap-title"></span><span class="tag" id="cap-tag"></span></div>
      <div class="d" id="cap-desc"></div>
    </div>
    <span class="x" id="cap-x" title="Hide">×</span>
  </div>
  <div class="hint">← → switch · 1–9,0 jump · F fullscreen</div>
</div>

<script>
  const C = [
    {file:'os-1-paper.html',        title:'Paper OS',        grp:'OS', tag:'minimal',    sw:'#c98a5e', d:'Refined stationery desktop — warm paper, folders, windows that open.'},
    {file:'os-2-aqua.html',         title:'Aqua Revival',    grp:'OS', tag:'glossy',     sw:'#3aa5d6', d:'Early-2000s glossy OS — Aqua + Frutiger Aero, magnifying dock.'},
    {file:'os-3-tty.html',          title:'TTY',             grp:'OS', tag:'terminal',   sw:'#7fd88f', d:'A beautiful live terminal — boots, then unfolds as shell output.'},
    {file:'os-4-hud.html',          title:'Neural HUD',      grp:'OS', tag:'overboard',  sw:'#38d6c4', d:'Holographic command deck — radar, telemetry, name decode.'},
    {file:'os-5-spatial.html',      title:'Spatial',         grp:'OS', tag:'depth',      sw:'#8fa6ff', d:'visionOS frosted-glass windows floating in depth, with parallax.'},
    {file:'fresh-6-broadcast.html', title:'Broadcast',       grp:'FRESH', tag:'sports TV', sw:'#c6ff3a', d:'A live sports-graphics package — score bug, telestrator, ticker.'},
    {file:'fresh-7-preprint.html',  title:'Preprint',        grp:'FRESH', tag:'academic', sw:'#b31b1b', d:'Typeset as a real arXiv paper — abstract, figures, BibTeX box.'},
    {file:'fresh-8-blueprint.html', title:'Blueprint',       grp:'FRESH', tag:'schematic', sw:'#5b8fd6', d:'An engineering drawing sheet — title block, dimensioned name.'},
    {file:'fresh-9-swiss.html',     title:'Swiss Brutalist', grp:'FRESH', tag:'typographic', sw:'#ff3b2f', d:'Giant Helvetica, rigorous grid — loud through type, not color.'},
    {file:'fresh-10-fieldnotes.html',title:'Field Notes',    grp:'FRESH', tag:'notebook', sw:'#2f6bd6', d:'An ML researcher’s lab notebook — graph paper, margins, tape.'},
  ];

  const tabsEl = document.getElementById('tabs');
  const stage = document.getElementById('stage');
  const loading = document.getElementById('loading');
  const caption = document.getElementById('caption');
  let current = -1;
  let frames = [];   // cache one iframe per concept, created lazily

  // build tabs (with OS / FRESH group labels + separator)
  C.forEach((c,i)=>{
    if(i===0){ const l=document.createElement('span'); l.className='grp-label'; l.textContent='OS'; tabsEl.appendChild(l); }
    if(i===5){ const s=document.createElement('span'); s.className='sep'; tabsEl.appendChild(s);
               const l=document.createElement('span'); l.className='grp-label'; l.textContent='Fresh'; tabsEl.appendChild(l); }
    const b=document.createElement('button');
    b.className='tab'; b.dataset.i=i;
    b.innerHTML=`<span class="n">${String(i+1).padStart(2,'0')}</span><span class="sw" style="background:${c.sw}"></span>${c.title}`;
    b.addEventListener('click',()=>show(i));
    tabsEl.appendChild(b);
  });
  const tabButtons = [...tabsEl.querySelectorAll('.tab')];

  function show(i){
    if(i===current) return;
    i=(i+C.length)%C.length;
    const c=C[i];

    // hide every existing frame first
    frames.forEach(f=>{ if(f) f.classList.remove('show'); });

    // lazy-create & cache iframe for this concept
    let f=frames[i];
    if(!f){
      f=document.createElement('iframe');
      f.title=c.title;
      f.addEventListener('load',()=>{
        f.dataset.loaded='1';
        if(current===i){ loading.classList.remove('on'); f.classList.add('show'); }
      });
      f.src=c.file;
      stage.insertBefore(f, stage.firstChild);
      frames[i]=f;
    }

    // reveal now if already loaded, otherwise show spinner and let load handler reveal
    if(f.dataset.loaded==='1'){ loading.classList.remove('on'); f.classList.add('show'); }
    else{ loading.classList.add('on'); }

    // tabs active state + scroll into view
    tabButtons.forEach((b,j)=>b.classList.toggle('active', j===i));
    tabButtons[i].scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});

    // caption
    document.getElementById('cap-sw').style.background=c.sw;
    document.getElementById('cap-title').textContent=c.title;
    document.getElementById('cap-tag').textContent=c.tag;
    document.getElementById('cap-desc').textContent=c.d;
    caption.classList.remove('hide');

    // open-in-new-tab href
    document.getElementById('openfull').href=c.file;

    // url hash for shareable/refresh state
    history.replaceState(null,'', '#'+(i+1));
    current=i;
  }

  document.getElementById('prev').addEventListener('click',()=>show(current-1));
  document.getElementById('next').addEventListener('click',()=>show(current+1));
  document.getElementById('cap-x').addEventListener('click',()=>caption.classList.add('hide'));

  document.addEventListener('keydown',(e)=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(e.key==='ArrowRight'){ show(current+1); e.preventDefault(); }
    else if(e.key==='ArrowLeft'){ show(current-1); e.preventDefault(); }
    else if(e.key>='1'&&e.key<='9'){ show(parseInt(e.key)-1); }
    else if(e.key==='0'){ show(9); }
    else if(e.key.toLowerCase()==='f'){ if(document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); }
    else if(e.key.toLowerCase()==='c'){ caption.classList.toggle('hide'); }
  });

  // initial: from hash or first
  const start = Math.min(Math.max(parseInt((location.hash||'').slice(1))||1,1),C.length)-1;
  show(start);
</script>
</body>
</html>
