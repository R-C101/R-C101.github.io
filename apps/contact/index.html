<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connect — Rishit Chugh</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }

  body {
    font-family: var(--font-ui);
    color: var(--ink);
    background:
      radial-gradient(120% 90% at 88% -8%, rgba(11,95,214,.07), transparent 55%),
      radial-gradient(90% 80% at 4% 108%, rgba(242,107,29,.06), transparent 60%),
      linear-gradient(168deg, #ffffff 0%, #f6f8fc 100%);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    /* faint blueprint grid on the paper */
    background-image:
      radial-gradient(120% 90% at 88% -8%, rgba(11,95,214,.07), transparent 55%),
      radial-gradient(90% 80% at 4% 108%, rgba(242,107,29,.06), transparent 60%),
      linear-gradient(rgba(11,95,214,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(11,95,214,.035) 1px, transparent 1px),
      linear-gradient(168deg, #ffffff 0%, #f6f8fc 100%);
    background-size: auto, auto, 26px 26px, 26px 26px, auto;
  }

  .stage {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 22px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 12px 36px -12px rgba(8,24,54,.22), 0 2px 6px rgba(8,24,54,.06);
    overflow: hidden;
  }

  /* ---- Header ------------------------------------------------------------ */
  .head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--line-2);
    background: linear-gradient(180deg, #fbfcff, #ffffff);
  }
  .mark {
    flex: 0 0 auto;
    width: 54px; height: 54px;
    border-radius: 15px;
    display: grid; place-items: center;
    background: linear-gradient(158deg, var(--blue), var(--blue-deep));
    box-shadow: var(--shadow-tile);
  }
  .mark svg { width: 34px; height: 34px; display: block; }
  .id { min-width: 0; }
  .id h1 {
    margin: 0;
    font-size: 19px;
    letter-spacing: -.02em;
    font-weight: 700;
    color: var(--ink);
  }
  .id .role {
    margin: 3px 0 0;
    font-size: 13px;
    color: var(--ink-2);
  }
  .status {
    margin-top: 8px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 10.5px; font-weight: 500; letter-spacing: .03em;
    color: #0a7a33;
    background: rgba(40,200,64,.10);
    border: 1px solid rgba(40,200,64,.28);
    padding: 3px 9px; border-radius: 999px;
  }
  .status .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--tl-green);
    box-shadow: 0 0 0 0 rgba(40,200,64,.5);
    animation: pulse 2.6s var(--ease-out) infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(40,200,64,.45); }
    70%,100% { box-shadow: 0 0 0 6px rgba(40,200,64,0); }
  }

  /* ---- Section label ----------------------------------------------------- */
  .sec-label {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 500; letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding: 16px 22px 4px;
  }

  /* ---- Social rows ------------------------------------------------------- */
  .rows { padding: 2px 12px 6px; }
  .row {
    display: flex; align-items: center; gap: 13px;
    padding: 11px 10px;
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    position: relative;
    transition: background .16s var(--ease-out), transform .16s var(--ease-out);
  }
  .row:hover { background: var(--blue-050); }
  .row:active { transform: scale(.99); }
  .row:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .row .g {
    flex: 0 0 auto;
    width: 38px; height: 38px;
    border-radius: 10px;
    display: grid; place-items: center;
    background: var(--paper-2);
    border: 1px solid var(--line);
  }
  .row .g svg { width: 20px; height: 20px; display: block; }
  .row .meta { min-width: 0; flex: 1; }
  .row .meta .t { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.25; }
  .row .meta .h {
    font-family: var(--font-mono);
    font-size: 11.5px; color: var(--ink-2);
    line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row .chev {
    flex: 0 0 auto; color: var(--ink-3);
    opacity: 0; transform: translateX(-3px);
    transition: opacity .16s var(--ease-out), transform .16s var(--ease-out);
  }
  .row:hover .chev, .row:focus-visible .chev { opacity: 1; transform: translateX(0); }
  .row .chev svg { width: 15px; height: 15px; display: block; }

  /* ---- CTA buttons ------------------------------------------------------- */
  .cta {
    display: flex; gap: 10px;
    padding: 8px 22px 22px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1 1 160px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 16px;
    border-radius: 11px;
    font-size: 13.5px; font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform .15s var(--ease-out), box-shadow .15s var(--ease-out), background .15s;
    white-space: nowrap;
  }
  .btn svg { width: 16px; height: 16px; display: block; }
  .btn.primary {
    background: linear-gradient(160deg, var(--blue), var(--blue-600));
    color: #fff;
    box-shadow: 0 6px 16px -6px rgba(11,95,214,.55), inset 0 1px 0 rgba(255,255,255,.28);
  }
  .btn.primary:hover { transform: translateY(-1px); box-shadow: 0 10px 22px -8px rgba(11,95,214,.6), inset 0 1px 0 rgba(255,255,255,.28); }
  .btn.primary:active { transform: translateY(0); }
  .btn.ghost {
    background: var(--paper);
    color: var(--ink);
    border-color: var(--line);
  }
  .btn.ghost:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-1px); }
  .btn.ghost:active { transform: translateY(0); }
  .btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

  /* ---- Footer ------------------------------------------------------------ */
  .foot {
    padding: 0 22px 18px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: var(--font-mono);
    font-size: 10.5px; letter-spacing: .05em;
    color: var(--ink-3);
  }
  .foot .tick { width: 5px; height: 5px; border-radius: 1px; background: var(--orange); }

  @media (max-width: 400px) {
    .stage { padding: 16px 12px; }
    .head { padding: 18px 16px 14px; }
    .rows { padding: 2px 8px 4px; }
    .cta { padding: 8px 16px 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .status .dot { animation: none; }
    .row, .btn, .row .chev { transition: none; }
  }
</style>
</head>
