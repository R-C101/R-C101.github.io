<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Rishit Chugh — RishitOS</title>
  <meta name="description" content="Rishit Chugh, ML Engineer. A portfolio built as a desktop operating system.">
  <meta name="theme-color" content="#08306b">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="shared/tokens.css">
  <link rel="stylesheet" href="os/os.css">
</head>
<body class="booting">

  <!-- Desktop + wallpaper -->
  <main id="desktop">
    <!-- Wallpaper: a STATIC wordmark, with a separate orbital animation circling it -->
    <div id="wall" aria-hidden="true">
      <div class="wall-cluster">
        <!-- the animation: an orrery / drafting instrument that turns around the name -->
        <svg class="wall-orbits" viewBox="-280 -280 560 560" preserveAspectRatio="xMidYMid meet">
          <g class="ring-field">
            <circle class="ring" r="120"/>
            <circle class="ring dash" r="176"/>
            <circle class="ring" r="230"/>
            <circle class="ring faint" r="272"/>
          </g>
          <g class="orbit o1">
            <line class="arm" x1="-120" y1="0" x2="120" y2="0"/>
            <circle class="mote lg" cx="120" cy="0" r="6"/>
            <circle class="mote" cx="-120" cy="0" r="3.5"/>
          </g>
          <g class="orbit o2"><circle class="mote" cx="176" cy="0" r="4.5"/></g>
          <g class="orbit o3">
            <circle class="mote lg" cx="230" cy="0" r="6.5"/>
            <circle class="mote sm" cx="0" cy="230" r="3"/>
          </g>
          <g class="orbit o4"><circle class="mote" cx="272" cy="0" r="4"/></g>
          <!-- central target, echoing the OS mark -->
          <g class="target">
            <circle class="ring" r="10"/>
            <line class="cross" x1="-17" y1="0" x2="17" y2="0"/>
            <line class="cross" x1="0" y1="-17" x2="0" y2="17"/>
            <circle class="hub" r="3.4"/>
          </g>
        </svg>
        <!-- the name: static, part of the wallpaper -->
        <svg class="wall-name" viewBox="0 0 640 300" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="nameGrad" x1="0" y1="0" x2="0.3" y2="1">
              <stop offset="0" stop-color="#ffb066"/>
              <stop offset="0.55" stop-color="#f6923c"/>
              <stop offset="1" stop-color="#e2620f"/>
            </linearGradient>
          </defs>
          <text x="20" y="132">RISHIT</text>
          <text x="20" y="268">CHUGH</text>
        </svg>
      </div>
    </div>
    <div id="desk-icons"></div>
    <div id="windows"></div>
  </main>

  <!-- Menu bar (top) -->
  <div id="menubar"></div>

  <!-- Dock (bottom) -->
  <div id="dock"></div>

  <!-- Boot screen -->
  <div id="boot" aria-hidden="true"></div>

  <!-- Small-screen notice (desktop-first) -->
  <div id="screen-notice">
    <div class="sn-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="8" stroke="#fff" stroke-width="1.7"/>
        <path d="M12 4.5v15M4.5 12h15" stroke="#fff" stroke-width="1.1" opacity=".55"/>
        <circle cx="12" cy="12" r="2.3" fill="#f6923c"/>
      </svg>
    </div>
    <h2>Best on a bigger screen</h2>
    <p>RishitOS is a windowed desktop — it wants room to breathe. Open it on a laptop or desktop for the full experience. A tailored mobile layout is coming.</p>
    <button id="sn-enter" type="button">Enter anyway</button>
  </div>

  <script src="os/os.js"></script>
</body>
</html>
